# ─────────────────────────────────────────────────────────────────────────────
# Render Blueprint — Loa Design Backend
#
# Para usar:
#   1. Crie conta em https://render.com
#   2. New + → Blueprint → conecte o repositório
#   3. Aponte para este arquivo (loadesign/Backend/render.yaml)
#   4. Defina manualmente DATABASE_URL e JWT_SECRET no dashboard
# ─────────────────────────────────────────────────────────────────────────────

services:
  - type: web
    name: loadesign-backend
    runtime: node
    rootDir: loadesign/Backend
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3333
      - key: DATABASE_URL
        sync: false      # definir manualmente no dashboard (Neon/Supabase URL)
      - key: JWT_SECRET
        generateValue: true  # Render gera um secreto forte automaticamente
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        sync: false      # definir manualmente: https://seu-site.vercel.app,https://seu-admin.vercel.app

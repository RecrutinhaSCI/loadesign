services:
  postgres:
    image: postgres:16-alpine
    container_name: loadesign_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: loa
      POSTGRES_PASSWORD: loa
      POSTGRES_DB: loadesign
    ports:
      - "5433:5432"
    volumes:
      - loadesign_postgres_data:/var/lib/postgresql/data

volumes:
  loadesign_postgres_data:
